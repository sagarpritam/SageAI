# ================================
# Ingress — Route traffic to frontend & backend
# Requires: nginx-ingress controller or cloud provider ingress
# ================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sageai-ingress
  namespace: sageai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - sageai.example.com
  #     secretName: sageai-tls
  rules:
    - host: sageai.example.com  # ← Change to your domain
      http:
        paths:
          # API routes → backend
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /scan
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /scans
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /reports
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /org
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /autofix
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /integrations
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /api-keys
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /billing
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /schedules
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /explain
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
