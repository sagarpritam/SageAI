apiVersion: v1
kind: Secret
metadata:
  name: sageai-secrets
  namespace: sageai
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production-use-a-strong-key"
  POSTGRES_PASSWORD: "sageai_secret_2024"
  DATABASE_URL: "postgresql+asyncpg://sageai:sageai_secret_2024@postgres:5432/sageai"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sageai-config
  namespace: sageai
data:
  ENV: "production"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  APP_NAME: "SageAI Security Scanner"
  DEBUG: "False"
  RATE_LIMIT: "60/minute"
  CORS_ORIGINS: "*"
  REDIS_URL: "redis://redis:6379/0"
