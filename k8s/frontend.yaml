# ================================
# SageAI Frontend — Deployment + Service
# ================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sageai
  labels:
    app: sageai-frontend
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sageai-frontend
  template:
    metadata:
      labels:
        app: sageai-frontend
        version: "2.0"
    spec:
      containers:
        - name: frontend
          image: sageai/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sageai
spec:
  selector:
    app: sageai-frontend
  ports:
    - port: 80
      targetPort: 80
