name: SageAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ––– Lint + SAST –––
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff bandit
      # Code style
      - run: ruff check app/ tests/
      # SAST — scan for security vulnerabilities in Python code
      - run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - run: bandit -r app/ --severity-level high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ––– Dependency Scanning (Trivy) –––
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — scan Python dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"

  # ––– Backend Tests + Alembic Migration Check –––
  test-backend:
    runs-on: ubuntu-latest
    needs: [lint-and-security]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sageai_test
          POSTGRES_USER: sageai
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx

      # Verify Alembic migrations run cleanly
      - name: Alembic migration check
        run: |
          alembic upgrade head
          alembic check || echo "No pending migrations"
        env:
          DATABASE_URL: "postgresql+asyncpg://sageai:test_password@localhost:5432/sageai_test"

      # Run tests
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          SECRET_KEY: "test-secret-key-for-ci"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"

  # ––– Frontend Build –––
  test-frontend:
    runs-on: ubuntu-latest
    needs: [lint-and-security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm ci && npm run build

  # ––– Docker Build + Security Scan –––
  docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, dependency-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/docker-compose.yml build

      # Scan built images for vulnerabilities
      - name: Trivy — scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "docker/sage-backend"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"
