# ================================
# SageAI — Render Blueprint
# https://render.com/docs/blueprint-spec
# ================================

services:
  # FastAPI Backend
  - type: web
    name: SageAI-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: SageAI-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: APP_NAME
        value: SageAI Security Scanner
      - key: ENV
        value: production
      - key: RATE_LIMIT
        value: 60/minute
      - key: PYTHON_VERSION
        value: 3.13.0

  # React Frontend (Static Site)
  - type: web
    name: SageAI-dashboard
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /auth/*
        destination: https://SageAI-api.onrender.com/auth/*
      - type: rewrite
        source: /scan*
        destination: https://SageAI-api.onrender.com/scan*
      - type: rewrite
        source: /reports/*
        destination: https://SageAI-api.onrender.com/reports/*
      - type: rewrite
        source: /explain/*
        destination: https://SageAI-api.onrender.com/explain/*
      - type: rewrite
        source: /org/*
        destination: https://SageAI-api.onrender.com/org/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

databases:
  - name: SageAI-db
    plan: starter
    databaseName: sageai
    user: aegis
