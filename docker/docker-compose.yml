# ================================
# SageAI — Docker Compose
# Services: Backend, Frontend, PostgreSQL, Redis
# ================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: sage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sageai
      POSTGRES_USER: sageai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sageai_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sageai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: sage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- FastAPI Backend ----------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: sage-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://sageai:${POSTGRES_PASSWORD:-sageai_secret_2024}@postgres:5432/sageai
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - APP_NAME=SageAI Security Scanner
      - ENV=production
      - DEBUG=False
      - RATE_LIMIT=60/minute
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- React Frontend (Nginx) ----------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: sage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
